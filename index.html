<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Professional Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1 class="app-title">☁️ Weather App</h1>

    <div class="container">
        <div class="top-bar">
            <p id="date"></p>
            <button id="darkToggle">🌙</button>
        </div>

        <div class="search-box">
            <input type="text" id="cityInput" placeholder="Enter city name">
            <button id="searchBtn">Search</button>
        </div>

        <button id="locationBtn" class="location-btn">📍 Use My Location</button>

        <div id="recentSearches" class="recent"></div>

        <div id="weatherResult" class="weather-box"></div>
        <div id="forecast" class="forecast"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
